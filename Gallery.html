<html>

<head>
    <title>Gallery.Page</title>
    <link rel="stylesheet" href="CSS/gallery.css">
    <!-- Link to JS -->
    <script src="Java/gallery.js" defer></script>
    <script src="Java/login.js" defer></script>
</head>

<body>
    <div class="navbar">
        <div class="icon">
            <a href="home.html">
                <img src="images/icon4.png" alt="Home Icon">
            </a>
        </div>
        <div class="menu">
            <ul>
                <li><a href="reservation.html">RESERVATION</a></li>
                <li><a href="menu.html">ORDER</a></li>
                <li><a href="gallery.html">GALLERY</a></li>
                <li><a href="#" id="loginBtn">LOGIN</a></li>
            </ul>
        </div>
    </div>
    <div>
        <p id="welcomeMessage"></p>
        <h1>Ristorante di famiglia Gallery</h1>
        <div class="gallery">
            <img src="images/margrita pizza.jpg" alt="Margherita Pizza">
            <img src="images/waiter.jpg" alt="Waiter">
            <img src="images/outdoor.jpg" alt="Outdoor Seating">
            <img src="images/decore.jpg" alt="Decor">
            <img src="images/Risotto.jpg" alt="Risotto">
            <img src="images/Lemon Juice.jpg" alt="Lemon Juice">
            <img src="images/Spaghetti.jpg" alt="Spaghetti">
            <img src="images/girl.jpg" alt="Girl">
            <img src="images/Bruschetta.jpg" alt="Bruschetta">
            <img src="images/espresso.jpg" alt="Espresso">
            <img src="images/resturant decore.jpg" alt="Restaurant Decor">
            <img src="images/Biscotti.jpg" alt="Biscotti">
            <img src="images/making food.jpg" alt="Making Food">
            <img src="images/Halloumi Salad.jpg" alt="Halloumi Salad">
            <img src="images/Cheese Sticks.jpg" alt="Cheese Sticks">
            <img src="images/gelato.jpg" alt="Gelato">
            <img src="images/stuff.jpg" alt="Stuff">
            <img src="images/White Pasta.jpg" alt="White Pasta">
        </div>
    </div>
    <!-- Sign In Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Register your details</h2>
            <form id="loginForm">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>

                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>

                <label for="mobile">Mobile No</label>
                <input type="text" id="mobile" name="mobile" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>

                <button type="submit">Login</button>
                <div class="message error" id="errorMessage"></div>
                <div class="message success" id="successMessage"></div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="social-icons">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="#"><img src="images/x2.png" alt="Twitter"></a>
            <a href="#"><img src="images/tiktok.png" alt="TikTok"></a>
            <a href="#"><img src="images/youtube.png" alt="YouTube"></a>
        </div>
        <div class="footer-nav">
            <a href="home.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="ourStory.html">About Us</a>
            <a href="reservation.html">Reservation</a>
            <a href="making-of.html">Making Of</a>
        </div>
    </footer>
</body>

</html>
