        <div class="navbar">
            <div class="icon">
                <a href="home.html">
                    <img src="images/icon4.png" alt="Home Icon">
                </a>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="reservation.html">RESERVATION</a></li>

        <!-- Background Image  -->
        <div class="background">
            <img src="Images\background.jpg">

        <div class="reservation-container">
            <p id="welcomeMessage"></p>
            <h1>Make a reservation</h1>
            <p>Select your details and we'll try to get the best seats for you</p>

            <div class="reservation-form">
                <div class="form-group">
                    <label for="party-size">Party size</label>
                    <select id="party-size" name="party-size">
                        <option>1 guest</option>
                        <option>2 guests</option>
                        <option>3 guests</option>
                        <option>4 guests</option>
                        <option>5 guests</option>
                        <option>6 guests</option>
                        <option>7 guests</option>
                        <option>8 guests</option>
                        <option>9 guests</option>
                        <option>10 guests</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" value="2024-11-13">
                </div>

                <div class="form-group">
                    <label for="time">Time</label>
                    <select id="time" name="time">
                        <option>1:00 PM</option>
                        <option>1:15 PM</option>
                        <option>1:30 PM</option>
                        <option>1:45 PM</option>
                        <option>2:00 PM</option>
                        <option>2:15 PM</option>
                        <option>2:30 PM</option>
                        <option>2:45 PM</option>
                        <option>3:00 PM</option>
                        <option>3:15 PM</option>
                        <option>3:30 PM</option>
                        <option>3:45 PM</option>
                        <option>4:00 PM</option>
                        <option>4:15 PM</option>
                        <option>4:30 PM</option>
                        <option>4:45 PM</option>
                        <option>5:00 PM</option>
                        <option>5:15 PM</option>
                        <option>5:30 PM</option>
                        <option>5:45 PM</option>
                        <option>6:00 PM</option>
                        <option>6:15 PM</option>
                        <option>6:30 PM</option>
                        <option>6:45 PM</option>
                        <option>7:00 PM</option>
                        <option>8:15 PM</option>
                        <option>8:30 PM</option>
                        <option>8:45 PM</option>
                        <option>9:00 PM</option>
                        <option>9:15 PM</option>
                        <option>9:30 PM</option>
                        <option>9:45 PM</option>
                        <option>10:00 PM</option>
                        <option>10:15 PM</option>
                        <option>10:30 PM</option>
                        <option>10:45 PM</option>
                        <option>11:00 PM</option>
                        <option>11:15 PM</option>
                        <option>11:30 PM</option>
                        <option>12:00 PM</option>
                        <!-- Add other times as needed -->
                    </select>
                </div>
            </div>

            <h2>Choose an available time slot:</h2>
            <div class="time-slots">
                <button>1:00 PM</button>
                <button>1:15 PM</button>
                <button>1:30 PM</button>
                <button>1:45 PM</button>
                <button>2:00 PM</button>
                <button>2:15 PM</button>
                <button>2:30 PM</button>
                <button>2:45 PM</button>
                <button>3:00 PM</button>
                <button>3:15 PM</button>
                <button>3:30 PM</button>
                <button>3:45 PM</button>
                <button>4:00 PM</button>
                <button>4:15 PM</button>
                <button>4:30 PM</button>
                <button>4:45 PM</button>
                <button>5:00 PM</button>
                <button>5:15 PM</button>
                <button>5:30 PM</button>
                <button>5:45 PM</button>
                <button>6:00 PM</button>
                <button>6:15 PM</button>
                <button>6:30 PM</button>
                <button>6:45 PM</button>
                <button>7:00 PM</button>

                <button>8:30 PM</button>
                <button>8:45 PM</button>
                <button>9:00 PM</button>

                <button>11:00 PM</button>
                <button>11:15 PM</button>
                <button>11:30 PM</button>
                <button>12:00 PM</button>
            </div>

            <button class="reserve-btn">Reserve Now</button>
        </div>
        Sign In Modal
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Register your details</h2>
                <form id="loginForm">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required>

                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>

                    <label for="mobile">Mobile No</label>
                    <input type="text" id="mobile" name="mobile" required>

                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>

                    <button type="submit">Login</button>
                    <div class="message error" id="errorMessage"></div>
                    <div class="message success" id="successMessage"></div>
                </form>
            </div>
        </div>

        <!-- footer-->
        <footer>
